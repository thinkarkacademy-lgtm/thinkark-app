<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkArk Academy — Exam</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --navy:#1a2e5a; --cream:#f0ede4; --cream-mid:#f8f6f0; --gold:#c9a84c; --border:#e8e5de; --green:#2a9d6e; --red:#e05252; --muted:#7a8399; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Barlow',sans-serif; background:var(--cream-mid); color:var(--navy); min-height:100vh; }
  .topbar { background:var(--navy); padding:0 32px; height:58px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .tb-brand { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:1rem; letter-spacing:2px; color:var(--cream); }
  .tb-exam { font-size:0.82rem; color:rgba(240,237,228,0.55); }
  .timer { font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; font-weight:800; color:var(--gold); letter-spacing:1px; }
  .timer.warn { color:var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .container { max-width:780px; margin:0 auto; padding:32px 20px; }
  .exam-header { background:white; border:1px solid var(--border); border-radius:14px; padding:24px 28px; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; }
  .eh-title { font-family:'Barlow Condensed',sans-serif; font-size:1.5rem; font-weight:800; color:var(--navy); }
  .eh-meta { font-size:0.82rem; color:var(--muted); margin-top:4px; }
  .progress-bar { height:6px; background:var(--border); border-radius:3px; margin-bottom:24px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--navy); border-radius:3px; transition:width 0.3s; }
  .q-card { background:white; border:1px solid var(--border); border-radius:14px; padding:28px; margin-bottom:16px; }
  .q-num { font-size:0.68rem; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:var(--gold); margin-bottom:10px; }
  .q-text { font-size:1rem; font-weight:600; color:var(--navy); line-height:1.6; margin-bottom:20px; }
  .options { display:flex; flex-direction:column; gap:10px; }
  .option { display:flex; align-items:center; gap:14px; padding:12px 16px; border:2px solid var(--border); border-radius:10px; cursor:pointer; transition:all 0.15s; }
  .option:hover { border-color:var(--navy); background:rgba(26,46,90,0.03); }
  .option.selected { border-color:var(--navy); background:rgba(26,46,90,0.06); }
  .option.correct { border-color:var(--green); background:rgba(42,157,110,0.08); }
  .option.wrong { border-color:var(--red); background:rgba(224,82,82,0.06); }
  .opt-label { width:28px; height:28px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:0.82rem; flex-shrink:0; transition:all 0.15s; }
  .option.selected .opt-label { background:var(--navy); color:white; border-color:var(--navy); }
  .option.correct .opt-label { background:var(--green); color:white; border-color:var(--green); }
  .option.wrong .opt-label { background:var(--red); color:white; border-color:var(--red); }
  .opt-text { font-size:0.9rem; color:var(--navy); line-height:1.5; }
  .nav-row { display:flex; align-items:center; justify-content:space-between; margin-top:24px; }
  .btn { padding:11px 24px; border-radius:10px; border:none; font-family:'Barlow Condensed',sans-serif; font-size:0.95rem; font-weight:700; letter-spacing:0.5px; cursor:pointer; transition:all 0.15s; }
  .btn-primary { background:var(--navy); color:var(--cream); }
  .btn-primary:hover { background:#243872; }
  .btn-secondary { background:white; color:var(--navy); border:1.5px solid var(--border); }
  .btn-secondary:hover { border-color:var(--navy); }
  .btn-submit { background:var(--green); color:white; }
  .q-nav { display:flex; gap:6px; flex-wrap:wrap; }
  .q-dot { width:30px; height:30px; border-radius:7px; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:0.72rem; font-weight:700; cursor:pointer; transition:all 0.15s; background:white; color:var(--navy); }
  .q-dot.answered { background:var(--navy); color:white; border-color:var(--navy); }
  .q-dot.current { border-color:var(--gold); color:var(--gold); }

  /* Result screen */
  .result-screen { display:none; }
  .result-hero { background:var(--navy); border-radius:20px; padding:40px; text-align:center; margin-bottom:24px; position:relative; overflow:hidden; }
  .result-hero::after { content:''; position:absolute; right:-80px; top:-80px; width:300px; height:300px; border-radius:50%; border:60px solid rgba(201,168,76,0.08); }
  .score-big { font-family:'Barlow Condensed',sans-serif; font-size:4rem; font-weight:800; color:var(--gold); line-height:1; }
  .score-label { font-size:0.82rem; color:rgba(240,237,228,0.5); letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
  .grade-display { margin-top:16px; display:inline-block; padding:6px 20px; background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3); border-radius:30px; font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; font-weight:800; color:var(--gold); letter-spacing:2px; }
  .result-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:24px; }
  .rs-card { background:white; border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }
  .rs-val { font-family:'Barlow Condensed',sans-serif; font-size:1.6rem; font-weight:800; color:var(--navy); }
  .rs-lbl { font-size:0.72rem; color:var(--muted); margin-top:3px; text-transform:uppercase; letter-spacing:1px; }

  /* Loading state */
  .loading-screen { text-align:center; padding:80px 20px; }
  .loading-screen .li { font-size:2.5rem; margin-bottom:16px; }
  .loading-screen .lt { font-family:'Barlow Condensed',sans-serif; font-size:1.2rem; font-weight:700; color:var(--navy); }
  .loading-screen .ls { font-size:0.85rem; color:var(--muted); margin-top:6px; }
  .spinner { display:inline-block; width:20px; height:20px; border:2.5px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin 0.6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="tb-brand">THINKARK ACADEMY</div>
    <div class="tb-exam" id="tb-exam-name">Loading exam…</div>
  </div>
  <div class="timer" id="timer-display">--:--</div>
</div>

<div class="container">

  <!-- Loading -->
  <div class="loading-screen" id="loading-screen">
    <div class="li"><span class="spinner"></span></div>
    <div class="lt">Loading your exam…</div>
    <div class="ls">Please wait</div>
  </div>

  <!-- Exam view -->
  <div id="exam-screen" style="display:none;">
    <div class="exam-header">
      <div>
        <div class="eh-title" id="exam-title">—</div>
        <div class="eh-meta" id="exam-meta">—</div>
      </div>
      <button class="btn btn-submit" onclick="confirmSubmit()">Submit Exam</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <!-- Question navigator -->
    <div style="background:white;border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <span style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);flex-shrink:0;">Questions:</span>
      <div class="q-nav" id="q-nav"></div>
    </div>

    <div id="questions-container"></div>

    <div class="nav-row">
      <button class="btn btn-secondary" id="btn-prev" onclick="goTo(currentQ-1)">← Previous</button>
      <span style="font-size:0.82rem;color:var(--muted)" id="q-counter">Question 1 of —</span>
      <button class="btn btn-primary" id="btn-next" onclick="goTo(currentQ+1)">Next →</button>
    </div>
  </div>

  <!-- Result view -->
  <div class="result-screen" id="result-screen">
    <div class="result-hero">
      <div class="score-big" id="res-score">—</div>
      <div class="score-label">Your Score</div>
      <div class="grade-display" id="res-grade">—</div>
    </div>
    <div class="result-stats">
      <div class="rs-card"><div class="rs-val" id="res-correct">—</div><div class="rs-lbl">Correct</div></div>
      <div class="rs-card"><div class="rs-val" id="res-wrong">—</div><div class="rs-lbl">Wrong</div></div>
      <div class="rs-card"><div class="rs-val" id="res-skipped">—</div><div class="rs-lbl">Skipped</div></div>
    </div>
    <div style="background:white;border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--navy);margin-bottom:16px;">Answer Review</div>
      <div id="answer-review"></div>
    </div>
    <div style="text-align:center;">
      <button class="btn btn-primary" onclick="window.location.href='dashboard-connected.html'">← Back to Dashboard</button>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://gaizlwyhthiqguqjfyuq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhaXpsd3lodGhpcWd1cWpmeXVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTY3OTEsImV4cCI6MjA4ODczMjc5MX0.VTN6TwKFLzmfpnOFOPH5XXnbwLQ3No45sitcRA-Cakk';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null, studentData = null;
let exam = null, questions = [], answers = {};
let currentQ = 0;
let timerInterval = null, secondsLeft = 0;

// ── Init ──
async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login-connected.html'; return; }
  currentUser = session.user;

  const params = new URLSearchParams(window.location.search);
  const examId = params.get('exam_id');
  if (!examId) { alert('No exam specified.'); window.location.href='dashboard-connected.html'; return; }

  // Load student
  const { data:stu } = await sb.from('students').select('*').eq('user_id', currentUser.id).single();
  studentData = stu;

  // Check already submitted
  if (studentData) {
    const { data:existing } = await sb.from('results').select('id').eq('student_id', studentData.id).eq('exam_id', examId).single();
    if (existing) { alert('You have already submitted this exam. Redirecting to dashboard.'); window.location.href='dashboard-connected.html'; return; }
  }

  // Load exam + questions
  const { data:examData } = await sb.from('exams').select('*, subjects(name)').eq('id', examId).single();
  if (!examData) { alert('Exam not found.'); window.location.href='dashboard-connected.html'; return; }
  exam = examData;

  const { data:qs } = await sb.from('questions').select('*').eq('exam_id', examId).order('order_index');
  questions = qs || [];

  document.getElementById('tb-exam-name').textContent = exam.title;
  document.getElementById('exam-title').textContent = exam.title;
  document.getElementById('exam-meta').textContent = `${exam.subjects?.name||'General'} · ${questions.length} questions · ${exam.total_marks} marks${exam.duration_minutes?' · '+exam.duration_minutes+' mins':''}`;
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('exam-screen').style.display = 'block';

  renderNav();
  renderQuestion(0);

  // Timer
  if (exam.duration_minutes) {
    secondsLeft = exam.duration_minutes * 60;
    timerInterval = setInterval(tickTimer, 1000);
    tickTimer();
  }
}

// ── Timer ──
function tickTimer() {
  if (secondsLeft <= 0) { clearInterval(timerInterval); submitExam(); return; }
  const m = Math.floor(secondsLeft/60).toString().padStart(2,'0');
  const s = (secondsLeft%60).toString().padStart(2,'0');
  const el = document.getElementById('timer-display');
  el.textContent = `${m}:${s}`;
  if (secondsLeft <= 120) el.classList.add('warn');
  secondsLeft--;
}

// ── Render nav dots ──
function renderNav() {
  document.getElementById('q-nav').innerHTML = questions.map((q,i) =>
    `<div class="q-dot ${answers[i]!==undefined?'answered':''} ${i===currentQ?'current':''}" onclick="goTo(${i})">${i+1}</div>`
  ).join('');
}

// ── Render question ──
function renderQuestion(idx) {
  if (!questions.length) { document.getElementById('questions-container').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);">No questions in this exam yet.</div>'; return; }
  currentQ = idx;
  const q = questions[idx];
  const opts = [['A',q.option_a],['B',q.option_b],['C',q.option_c],['D',q.option_d]].filter(o=>o[1]);
  const selected = answers[idx];
  document.getElementById('questions-container').innerHTML = `
    <div class="q-card">
      <div class="q-num">Question ${idx+1} of ${questions.length}</div>
      <div class="q-text">${q.question_text}</div>
      <div class="options">${opts.map(([lbl,text])=>`
        <div class="option ${selected===lbl?'selected':''}" onclick="selectAnswer(${idx},'${lbl}',this)">
          <div class="opt-label">${lbl}</div>
          <div class="opt-text">${text}</div>
        </div>`).join('')}
      </div>
    </div>`;
  document.getElementById('q-counter').textContent = `Question ${idx+1} of ${questions.length}`;
  document.getElementById('btn-prev').style.visibility = idx===0?'hidden':'visible';
  document.getElementById('btn-next').textContent = idx===questions.length-1?'Submit Exam →':'Next →';
  document.getElementById('btn-next').className = idx===questions.length-1?'btn btn-submit':'btn btn-primary';
  document.getElementById('btn-next').onclick = idx===questions.length-1?confirmSubmit:()=>goTo(currentQ+1);
  document.getElementById('progress-fill').style.width = `${((idx+1)/questions.length)*100}%`;
  renderNav();
}

function selectAnswer(qIdx, option) {
  answers[qIdx] = option;
  renderQuestion(qIdx);
}

function goTo(idx) {
  if (idx < 0 || idx >= questions.length) return;
  renderQuestion(idx);
}

function confirmSubmit() {
  const answered = Object.keys(answers).length;
  const skipped = questions.length - answered;
  if (skipped > 0) {
    if (!confirm(`You have ${skipped} unanswered question(s). Submit anyway?`)) return;
  }
  clearInterval(timerInterval);
  submitExam();
}

async function submitExam() {
  document.getElementById('exam-screen').style.display = 'none';
  document.getElementById('loading-screen').style.display = 'block';
  document.getElementById('loading-screen').querySelector('.lt').textContent = 'Submitting your exam…';

  // Calculate score
  let correct = 0, wrong = 0;
  questions.forEach((q, i) => {
    if (answers[i] === undefined) return;
    if (answers[i] === q.correct_option) correct++;
    else wrong++;
  });
  const skipped = questions.length - correct - wrong;
  const marksObtained = correct * (questions[0]?.marks || 1);

  // Save result
  if (studentData) {
    await sb.from('results').insert({
      student_id: studentData.id, exam_id: exam.id,
      marks_obtained: marksObtained, total_marks: exam.total_marks,
    });
  }

  // Show results
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const pct = Math.round((marksObtained / exam.total_marks) * 100);
  const grade = pct>=90?'A+':pct>=80?'A':pct>=70?'B':pct>=60?'C':pct>=50?'D':'F';
  const gradeColors = {'A+':'var(--green)','A':'var(--green)','B':'var(--navy)','C':'var(--gold)','D':'var(--orange)','F':'var(--red)'};

  document.getElementById('res-score').textContent = `${marksObtained}/${exam.total_marks}`;
  document.getElementById('res-grade').textContent = `${grade} · ${pct}%`;
  document.getElementById('res-grade').style.color = gradeColors[grade];
  document.getElementById('res-correct').textContent = correct;
  document.getElementById('res-wrong').textContent = wrong;
  document.getElementById('res-skipped').textContent = skipped;

  // Answer review
  document.getElementById('answer-review').innerHTML = questions.map((q,i)=>{
    const given = answers[i];
    const isCorrect = given === q.correct_option;
    const isSkipped = !given;
    const color = isSkipped ? 'var(--muted)' : isCorrect ? 'var(--green)' : 'var(--red)';
    const icon = isSkipped ? '○' : isCorrect ? '✓' : '✗';
    return `<div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;">
      <div style="font-weight:800;color:${color};font-size:0.9rem;flex-shrink:0;margin-top:2px;">${icon}</div>
      <div style="flex:1;">
        <div style="font-size:0.82rem;font-weight:600;color:var(--navy);line-height:1.5;margin-bottom:4px;">${q.question_text}</div>
        <div style="font-size:0.75rem;color:${isSkipped?'var(--muted)':isCorrect?'var(--green)':'var(--red)'}">
          ${isSkipped?'Skipped':`Your answer: ${given}`} ${!isCorrect&&!isSkipped?`· Correct: ${q.correct_option}`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
